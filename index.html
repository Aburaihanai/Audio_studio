<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Audio Studio Pro</title>
    <style>
        :root { --primary: #6c5ce7; --danger: #ff7675; --success: #55efc4; --dark: #2d3436; --accent: #a29bfe; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .studio-card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; }
        
        h2 { color: var(--dark); margin: 0 0 15px 0; font-size: 1.5rem; }
        canvas { width: 100%; height: 100px; background: var(--dark); border-radius: 12px; margin-bottom: 20px; }
        
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: left; }
        .control-item label { display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: bold; color: #636e72; margin-bottom: 5px; text-transform: uppercase; }
        .control-item span { color: var(--primary); }
        input[type=range] { width: 100%; accent-color: var(--primary); cursor: pointer; }

        .action-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        
        #recordBtn { background: var(--primary); color: white; }
        #recordBtn.recording { background: var(--danger); animation: pulse 1s infinite; }
        #stopBtn { background: #dfe6e9; color: #636e72; }
        #stopBtn:not(:disabled) { background: var(--dark); color: white; }

        .tracks { text-align: left; border-top: 1px solid #eee; padding-top: 20px; max-height: 300px; overflow-y: auto; }
        .audio-item { background: #f1f2f6; padding: 15px; border-radius: 12px; margin-top: 10px; border-left: 4px solid var(--primary); }
        .audio-item span { font-size: 0.7rem; color: #636e72; font-family: monospace; display: block; margin-bottom: 10px; }
        
        audio { width: 100%; height: 35px; }
        .download-link { display: inline-block; background: var(--success); color: #1e272e; font-size: 0.75rem; padding: 8px 12px; margin-top: 10px; text-decoration: none; border-radius: 6px; font-weight: bold; width: 100%; text-align: center; box-sizing: border-box; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="studio-card">
    <h2>Studio Pro</h2>
    <canvas id="visualizer"></canvas>

    <div class="controls-grid">
        <div class="control-item">
            <label>Pitch <span>x<small id="pVal">1.0</small></span></label>
            <input type="range" id="pitchShift" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>
        <div class="control-item">
            <label>Volume <span><small id="vVal">100</small>%</span></label>
            <input type="range" id="gainNode" min="0" max="2" step="0.1" value="1">
        </div>
        <div class="control-item">
            <label>Echo <span><small id="eVal">0</small>s</span></label>
            <input type="range" id="echoDelay" min="0" max="1" step="0.1" value="0">
        </div>
        <div class="control-item">
            <label>Reverb <span><small id="rVal">0</small></span></label>
            <input type="range" id="reverbMix" min="0" max="1" step="0.1" value="0">
        </div>
    </div>

    <div class="action-btns">
        <button id="recordBtn">Start Recording</button>
        <button id="stopBtn" disabled>Stop</button>
    </div>

    <div class="tracks" id="tracksContainer">
        <small style="color:#b2bec3">Recorded sequences will appear here</small>
    </div>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    let audioCtx;
    let analyser;
    const canvas = document.getElementById('visualizer');
    const canvasCtx = canvas.getContext('2d');

    // UI Elements
    const recordBtn = document.getElementById('recordBtn');
    const stopBtn = document.getElementById('stopBtn');
    const tracksContainer = document.getElementById('tracksContainer');

    // Update labels helper
    const updateLabel = (id, val) => document.getElementById(id).innerText = val;

    recordBtn.onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // Re-initialize Audio Context on user gesture
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } else if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            
            visualize();

            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.start();
            
            audioChunks = []; // Reset chunks
            recordBtn.classList.add('recording');
            recordBtn.innerText = "🔴 Recording...";
            recordBtn.disabled = true;
            stopBtn.disabled = false;

            mediaRecorder.ondataavailable = e => {
                if (e.data.size > 0) audioChunks.push(e.data);
            };
            
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' }); // Saved as webm/mp3 container
                const audioUrl = URL.createObjectURL(audioBlob);
                addTrackItem(audioUrl);
            };
        } catch (err) {
            console.error("Microphone access denied or error:", err);
            alert("Could not start recording. Please ensure microphone permissions are granted.");
        }
    };

    stopBtn.onclick = () => {
        mediaRecorder.stop();
        recordBtn.classList.remove('recording');
        recordBtn.innerText = "Start Recording";
        recordBtn.disabled = false;
        stopBtn.disabled = true;
    };

    function addTrackItem(url) {
        const div = document.createElement('div');
        div.className = 'audio-item';
        
        const timestamp = new Date().toLocaleTimeString();
        const pitch = document.getElementById('pitchShift').value;
        const vol = document.getElementById('gainNode').value;
        
        div.innerHTML = `
            <span>TAKE_${Date.now()} | Pitch: ${pitch}x | Vol: ${vol * 100}%</span>
            <audio controls src="${url}"></audio>
            <a href="${url}" download="recording_${Date.now()}.mp3" class="download-link">Download MP3</a>
        `;
        
        tracksContainer.prepend(div);
        
        // Apply pitch to the player
        const player = div.querySelector('audio');
        player.playbackRate = pitch;
        player.volume = Math.min(vol, 1); // Clamp standard volume
    }

    function visualize() {
        if (!analyser) return;
        analyser.fftSize = 256;
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        function draw() {
            requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);
            
            canvasCtx.fillStyle = '#2d3436';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

            let barWidth = (canvas.width / bufferLength) * 2.5;
            let barHeight;
            let x = 0;

            for(let i = 0; i < bufferLength; i++) {
                barHeight = dataArray[i] / 2.5;
                canvasCtx.fillStyle = `hsl(${250 + (barHeight)}, 70%, 65%)`;
                canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
        }
        draw();
    }

    // Slider Listeners for UI Feedback
    document.getElementById('pitchShift').oninput = (e) => updateLabel('pVal', e.target.value);
    document.getElementById('gainNode').oninput = (e) => updateLabel('vVal', e.target.value * 100);
    document.getElementById('echoDelay').oninput = (e) => updateLabel('eVal', e.target.value);
    document.getElementById('reverbMix').oninput = (e) => updateLabel('rVal', e.target.value);
</script>

</body>
</html>
    <h1 style="margin:0 0 10px 0; font-size: 1.5rem;">Vocal Studio Pro</h1>
    
    <canvas id="viz"></canvas>

    <div class="controls-grid">
        <div class="control-item">
            <label>Input Gain</label>
            <input type="range" id="gain" min="0" max="2" step="0.1" value="1">
        </div>
        <div class="control-item">
            <label>Pitch (Playback)</label>
            <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div class="control-item">
            <label>Echo Delay (Time)</label>
            <input type="range" id="delayTime" min="0" max="1" step="0.05" value="0.3">
        </div>
        <div class="control-item">
            <label>Echo Feedback (Wet)</label>
            <input type="range" id="feedback" min="0" max="0.8" step="0.05" value="0">
        </div>
        <div class="control-item" style="grid-column: span 2;">
            <label>Voice Profile</label>
            <select id="voiceProfile">
                <option value="normal">Normal (Default)</option>
                <option value="female">Natural Female</option>
                <option value="child">Child / Tiny</option>
                <option value="deep">Deep / Radio</option>
            </select>
        </div>
    </div>

    <div class="action-btns">
        <button id="recordBtn">Record Track</button>
        <button id="stopBtn" disabled>Stop</button>
    </div>

    <div class="tracks" id="trackList">
        <p id="emptyMsg" style="font-size: 0.8rem; color: #b2bec3; text-align: center;">Recorded tracks will appear here...</p>
    </div>
</div>

<script>
    let audioCtx, stream, recorder, chunks = [];
    let source, analyzer, gainNode, delayNode, feedbackNode, filterNode;

    const recordBtn = document.getElementById('recordBtn');
    const stopBtn = document.getElementById('stopBtn');
    const canvas = document.getElementById('viz');
    const ctx = canvas.getContext('2d');

    async function setupAudio() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            source = audioCtx.createMediaStreamSource(stream);
            
            // Nodes setup
            filterNode = audioCtx.createBiquadFilter();
            filterNode.type = "allpass";
            
            gainNode = audioCtx.createGain();
            analyzer = audioCtx.createAnalyser();
            
            delayNode = audioCtx.createDelay(1.0);
            feedbackNode = audioCtx.createGain();
            feedbackNode.gain.value = 0; 

            // --- SIGNAL CHAIN ---
            // Source -> Filter -> Gain -> Analyzer
            source.connect(filterNode);
            filterNode.connect(gainNode);
            gainNode.connect(analyzer);
            
            // Echo Loop (Connected to GainNode output)
            gainNode.connect(delayNode);
            delayNode.connect(feedbackNode);
            feedbackNode.connect(delayNode);
            
            // To hear yourself (Only if using headphones!)
            // gainNode.connect(audioCtx.destination);
            // delayNode.connect(audioCtx.destination);

            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = exportAudio;

            visualize();
        } catch (err) {
            alert("Mic access denied or not supported.");
        }
    }

    function visualize() {
        const bufferLength = analyzer.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        
        function draw() {
            requestAnimationFrame(draw);
            analyzer.getByteFrequencyData(dataArray);
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const barWidth = (canvas.width / bufferLength) * 2;
            let x = 0;
            for(let i = 0; i < bufferLength; i++) {
                let barHeight = dataArray[i] / 2.5;
                ctx.fillStyle = `hsl(${250 + (i/2)}, 70%, 65%)`;
                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
        }
        draw();
    }

    function exportAudio() {
        const blob = new Blob(chunks, { type: 'audio/ogg; codecs=opus' });
        chunks = [];
        const url = URL.createObjectURL(blob);
        
        const timestamp = new Date().toLocaleTimeString();
        const fileName = `Take_${timestamp.replace(/[: ]/g, '-')}.ogg`;

        const emptyMsg = document.getElementById('emptyMsg');
        if(emptyMsg) emptyMsg.remove();

        const div = document.createElement('div');
        div.className = 'audio-item';
        div.innerHTML = `
            <span>${fileName}</span>
            <div class="audio-controls">
                <audio controls src="${url}"></audio>
                <a href="${url}" download="${fileName}" style="text-decoration:none; font-size:1.2rem;">💾</a>
            </div>
        `;
        document.getElementById('trackList').prepend(div);
        applyPitch(); 

        // Auto-download trigger
        const link = document.createElement('a');
        link.href = url;
        link.download = fileName;
        link.click();
    }

    // --- Control Handlers ---
    recordBtn.onclick = async () => {
        if (!audioCtx) await setupAudio();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        recorder.start();
        recordBtn.classList.add('recording');
        recordBtn.innerText = "Recording...";
        recordBtn.disabled = true;
        stopBtn.disabled = false;
    };

    stopBtn.onclick = () => {
        recorder.stop();
        recordBtn.classList.remove('recording');
        recordBtn.innerText = "Record Track";
        recordBtn.disabled = false;
        stopBtn.disabled = true;
    };

    document.getElementById('gain').oninput = (e) => gainNode.gain.value = e.target.value;
    document.getElementById('delayTime').oninput = (e) => delayNode.delayTime.value = e.target.value;
    document.getElementById('feedback').oninput = (e) => feedbackNode.gain.value = e.target.value;
    
    function applyPitch() {
        const rate = document.getElementById('pitch').value;
        document.querySelectorAll('audio').forEach(a => a.playbackRate = rate);
    }
    document.getElementById('pitch').oninput = applyPitch;

    document.getElementById('voiceProfile').onchange = function(e) {
        const profile = e.target.value;
        const pSlider = document.getElementById('pitch');
        
        if (profile === 'female') {
            pSlider.value = 1.2;
            filterNode.type = "highpass";
            filterNode.frequency.value = 400;
        } else if (profile === 'child') {
            pSlider.value = 1.5;
            filterNode.type = "highpass";
            filterNode.frequency.value = 600;
        } else if (profile === 'deep') {
            pSlider.value = 0.8;
            filterNode.type = "lowpass";
            filterNode.frequency.value = 800;
        } else {
            pSlider.value = 1.0;
            filterNode.type = "allpass";
        }
        applyPitch();
    };

    // SW Registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        });
    }
</script>
</body>
</html>
